<div class="page-wrapper-container">
    <div class="page-header shadow-sm mb-4" [ngClass]="headerBgClass">
        <div class="container-fluid py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="header-title-section">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item">
                                <a routerLink="/dashboard" class="text-decoration-none text-muted">
                                    <i class="fas fa-home me-1"></i>{{ 'Home' | translate }}
                                </a>
                            </li>
                            <li class="breadcrumb-item active fw-bold text-primary">{{ pageTitle | translate }}</li>
                        </ol>
                    </nav>
                </div>

                <div class="header-actions">
                    <ng-content select="[header-actions]"></ng-content>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <div class="content-fade-in">
            <ng-content></ng-content>
        </div>
    </div>
</div>
