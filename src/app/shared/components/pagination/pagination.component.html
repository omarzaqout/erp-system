<nav *ngIf="totalPages > 1" aria-label="Page navigation">
    <ul class="pagination justify-content-center mb-0">
        <li class="page-item" [class.disabled]="currentPage === 1">
            <a class="page-link" (click)="onPageChange(currentPage - 1)" aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
            </a>
        </li>

        <li class="page-item" *ngFor="let page of visiblePages" [class.active]="page === currentPage"
            [class.disabled]="page === -1">
            <a class="page-link" (click)="page !== -1 && onPageChange(page)">
                {{ page === -1 ? '...' : page }}
            </a>
        </li>

        <li class="page-item" [class.disabled]="currentPage === totalPages">
            <a class="page-link" (click)="onPageChange(currentPage + 1)" aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
            </a>
        </li>
    </ul>
</nav>

<div class="text-center mt-2 text-muted small" *ngIf="showInfo">
    {{ 'Showing' | translate }} {{ startItem }} {{ 'to' | translate }} {{ endItem }} {{ 'of' | translate }} {{
    totalItems }} {{ 'entries' | translate }}
</div>
