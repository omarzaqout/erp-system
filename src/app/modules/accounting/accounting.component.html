<app-page-wrapper pageTitle="Accounting">
    <ng-container header-actions>
        <div class="d-flex align-items-center gap-3">
            <span class="badge p-2 text-dark bg-light border">
                <i class="fas fa-calendar-alt me-2 text-primary"></i> {{ today | date:'mediumDate' }}
            </span>
            <button class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-sync-alt me-1"></i> Refresh
            </button>
        </div>
    </ng-container>

    <router-outlet></router-outlet>
</app-page-wrapper>
