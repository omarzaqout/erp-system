<div class="h-100 d-flex flex-column">
    <!-- Search & Filters -->
    <div class="p-3 bg-white border-bottom shadow-sm">
        <div class="input-group input-group-lg mb-3">
            <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" [placeholder]="'Search products' | translate"
                (input)="onSearch($event)">
        </div>
        <div class="d-flex align-items-center gap-2 overflow-auto pb-2 category-tags no-scrollbar">
            <button *ngFor="let cat of categories$ | async" class="btn btn-sm rounded-pill px-4 text-nowrap"
                [class.btn-primary]="currentCategory === cat" [class.btn-outline-secondary]="currentCategory !== cat"
                (click)="selectCategory(cat)">
                {{ cat | translate }}
            </button>
            <div class="ms-auto d-flex align-items-center small fw-bold no-print" [ngSwitch]="scannerState$ | async">
                <ng-container *ngSwitchCase="'idle'">
                    <span class="pulse-dot grey me-2"></span>
                    <i class="fas fa-barcode me-1 text-muted"></i>
                    <span class="text-muted">{{ 'Scanner Ready' | translate }}</span>
                </ng-container>
                <ng-container *ngSwitchCase="'scanning'">
                    <span class="pulse-dot blue me-2"></span>
                    <i class="fas fa-sync fa-spin me-1 text-primary"></i>
                    <span class="text-primary">{{ 'Scanning...' | translate }}</span>
                </ng-container>
                <ng-container *ngSwitchCase="'success'">
                    <span class="pulse-dot green me-2"></span>
                    <i class="fas fa-check-circle me-1 text-success"></i>
                    <span class="text-success">{{ 'Product Found!' | translate }}</span>
                </ng-container>
                <ng-container *ngSwitchCase="'error'">
                    <span class="pulse-dot red me-2"></span>
                    <i class="fas fa-exclamation-triangle me-1 text-danger"></i>
                    <span class="text-danger">{{ 'Not Found' | translate }}</span>
                </ng-container>
            </div>
        </div>
    </div>

    <!-- Grid -->
    <div class="flex-grow-1 overflow-auto p-3 bg-light bg-opacity-50">
        <div class="row g-3">
            <div class="col-6 col-lg-4 col-xl-3" *ngFor="let product of products$ | async">
                <div class="card h-100 border-0 shadow-sm product-card transition-all" (click)="addToCart(product)"
                    role="button">
                    <div class="card-img-top bg-white d-flex align-items-center justify-content-center p-3"
                        style="height: 140px;">
                        <i class="fas fa-box fa-3x text-secondary opacity-25"></i>
                        <!-- <img [src]="product.image" class="img-fluid" style="max-height: 120px;"> -->
                    </div>
                    <div class="card-body p-2 text-center bg-white border-top">
                        <h6 class="card-title text-truncate mb-1 small fw-bold" [title]="product.name">{{ product.name
                            }}</h6>
                        <div class="text-primary fw-bold">{{ product.price | erpCurrency }}</div>
                        <div class="text-muted extra-small" *ngIf="product.sku">{{ product.sku }}</div>
                    </div>
                </div>
            </div>

            <!-- Empty State for Search -->
            <div class="col-12 py-5 text-center text-muted" *ngIf="(products$ | async)?.length === 0">
                <i class="fas fa-search fa-3x mb-3 opacity-25"></i>
                <p>{{ 'No products found' | translate }}</p>
            </div>
        </div>
    </div>
</div>

<style>
    .product-card {
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
    }

    .extra-small {
        font-size: 0.7rem;
    }
</style>
